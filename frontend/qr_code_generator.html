
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .wrap {
    min-height: 100vh;
    background: #FAF7F2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1.5rem;
    font-family: 'DM Sans', sans-serif;
  }

  .brand {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .brand-icon {
    width: 52px; height: 52px;
    background: #3B1F0A;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem;
  }

  .brand-icon svg { width: 28px; height: 28px; fill: #FAF7F2; }

  .brand h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: #2A1205;
    letter-spacing: -0.5px;
  }

  .brand p {
    font-size: 14px;
    color: #8B6347;
    margin-top: 4px;
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    padding: 2rem;
    width: 100%;
    max-width: 420px;
    border: 1px solid #E8DDD3;
  }

  .input-group {
    margin-bottom: 1.25rem;
  }

  .input-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: #8B6347;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  #url-input {
    flex: 1;
    height: 46px;
    border: 1.5px solid #E0D5CA;
    border-radius: 12px;
    padding: 0 14px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: #2A1205;
    background: #FAF7F2;
    outline: none;
    transition: border-color 0.2s;
  }

  #url-input::placeholder { color: #C4AFA3; }
  #url-input:focus { border-color: #8B6347; background: #fff; }

  #gen-btn {
    height: 46px;
    padding: 0 20px;
    background: #3B1F0A;
    color: #FAF7F2;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, transform 0.1s;
  }

  #gen-btn:hover { background: #5C3018; }
  #gen-btn:active { transform: scale(0.97); }

  .divider {
    height: 1px;
    background: #F0E8E0;
    margin: 1.5rem 0;
  }

  .qr-area {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .qr-placeholder {
    width: 200px; height: 200px;
    border-radius: 16px;
    background: #FAF7F2;
    border: 2px dashed #D4C4B8;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: #C4AFA3;
    font-size: 13px;
    text-align: center;
    padding: 1rem;
  }

  .qr-placeholder svg { width: 36px; height: 36px; opacity: 0.4; }

  #qr-output {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  #qr-canvas-wrap {
    background: #fff;
    border-radius: 16px;
    padding: 16px;
    border: 1px solid #E0D5CA;
    box-shadow: 0 2px 16px rgba(59,31,10,0.07);
  }

  #qr-canvas { display: block; border-radius: 8px; }

  .qr-url-badge {
    background: #FAF7F2;
    border: 1px solid #E0D5CA;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    color: #8B6347;
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .action-row {
    display: flex;
    gap: 8px;
  }

  .btn-dl, .btn-copy {
    flex: 1;
    height: 40px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn-dl {
    background: #3B1F0A;
    color: #FAF7F2;
    border: none;
  }

  .btn-dl:hover { background: #5C3018; }
  .btn-dl:active { transform: scale(0.97); }

  .btn-copy {
    background: #fff;
    color: #5C3018;
    border: 1.5px solid #D4C4B8;
  }

  .btn-copy:hover { background: #FAF7F2; }
  .btn-copy:active { transform: scale(0.97); }

  .toast {
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2A1205;
    color: #FAF7F2;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    padding: 10px 20px;
    border-radius: 10px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 999;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .color-pickers {
    margin-bottom: 0;
  }

  .cp-row {
    display: flex;
    gap: 12px;
  }

  .cp-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }

  .cp-label {
    font-size: 11px;
    color: #8B6347;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .cp-item input[type="color"] {
    width: 100%;
    height: 36px;
    border: 1.5px solid #E0D5CA;
    border-radius: 10px;
    padding: 2px;
    cursor: pointer;
    background: none;
  }
</style>

<div class="wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M3 3h7v7H3V3zm2 2v3h3V5H5zm9-2h7v7h-7V3zm2 2v3h3V5h-3zM3 14h7v7H3v-7zm2 2v3h3v-3H5zm13-2h2v2h-2v-2zm-4 0h2v2h-2v-2zm2 2h2v2h-2v-2zm-2 2h2v2h-2v-2zm2 2h2v2h-2v-2zm2-2h2v2h-2v-2z"/>
      </svg>
    </div>
    <h1>QR Generator</h1>
    <p>Ubah link menjadi kode QR dalam sekejap</p>
  </div>

  <div class="card">
    <div class="input-group">
      <label class="input-label" for="url-input">Masukkan URL</label>
      <div class="input-row">
        <input type="text" id="url-input" placeholder="https://contoh.com" />
        <button id="gen-btn">Generate</button>
      </div>
    </div>

    <div class="color-pickers input-group">
      <div class="cp-row">
        <div class="cp-item">
          <span class="cp-label">Warna QR</span>
          <input type="color" id="fg-color" value="#2A1205" />
        </div>
        <div class="cp-item">
          <span class="cp-label">Background</span>
          <input type="color" id="bg-color" value="#FAF7F2" />
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="qr-area">
      <div class="qr-placeholder" id="qr-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="4" height="4"/>
        </svg>
        QR code akan muncul di sini
      </div>

      <div id="qr-output">
        <div id="qr-canvas-wrap">
          <canvas id="qr-canvas" width="200" height="200"></canvas>
        </div>
        <div class="qr-url-badge" id="qr-url-badge"></div>
        <div class="action-row">
          <button class="btn-dl" id="dl-btn">Unduh PNG</button>
          <button class="btn-copy" id="copy-btn">Salin URL</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<script>
  const input = document.getElementById('url-input');
  const btn = document.getElementById('gen-btn');
  const placeholder = document.getElementById('qr-placeholder');
  const output = document.getElementById('qr-output');
  const canvas = document.getElementById('qr-canvas');
  const badge = document.getElementById('qr-url-badge');
  const dlBtn = document.getElementById('dl-btn');
  const copyBtn = document.getElementById('copy-btn');
  const toast = document.getElementById('toast');
  const fgColor = document.getElementById('fg-color');
  const bgColor = document.getElementById('bg-color');

  let lastUrl = '';

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function generateQR() {
    let url = input.value.trim();
    if (!url) { showToast('Masukkan URL terlebih dahulu'); return; }
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

    lastUrl = url;
    badge.textContent = url;

    QRCode.toCanvas(canvas, url, {
      width: 200,
      margin: 2,
      color: {
        dark: fgColor.value,
        light: bgColor.value
      },
      errorCorrectionLevel: 'H'
    }, function(err) {
      if (err) { showToast('Gagal membuat QR'); return; }
      placeholder.style.display = 'none';
      output.style.display = 'flex';
    });
  }

  btn.addEventListener('click', generateQR);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') generateQR(); });

  fgColor.addEventListener('change', () => { if (lastUrl) generateQR(); });
  bgColor.addEventListener('change', () => { if (lastUrl) generateQR(); });

  dlBtn.addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = 'qrcode.png';
    link.href = canvas.toDataURL();
    link.click();
    showToast('QR code diunduh!');
  });

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(lastUrl).then(() => {
      showToast('URL disalin ke clipboard!');
    }).catch(() => showToast('Gagal menyalin URL'));
  });
</script>
